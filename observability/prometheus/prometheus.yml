global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alerts.rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "<ALERTMANAGER-IP>:9093"

scrape_configs:

  # Node Exporter (System Metrics)
  - job_name: 'node-exporter'
    static_configs:
      - targets:
          - '<APP-EC2-IP>:9100'

  # Flask Application Metrics
  - job_name: 'flask-app'
    metrics_path: /metrics
    static_configs:
      - targets:
          - '<APP-EC2-IP>:5000'

  # Alloy Metrics (optional UI/metrics endpoint)
  - job_name: 'alloy'
    static_configs:
      - targets:
          - '<APP-EC2-IP>:12345'
